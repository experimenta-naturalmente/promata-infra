name: Deploy Infrastructure (AWS)

on:
  push:
    branches: [main]
    paths:
      - 'iac/aws/**'
      - '.github/workflows/infra-aws.yml'
  pull_request:
    paths:
      - 'iac/aws/**'
  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform action (plan/apply/destroy)'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply
          - destroy

env:
  AWS_REGION: sa-east-1
  TF_VERSION: 1.10.0

jobs:
  terraform:
    name: Terraform ${{ github.event.inputs.action || 'plan' }}
    runs-on: ubuntu-24.04
    environment: Produção
    defaults:
      run:
        working-directory: iac/aws

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform Backend (S3 + DynamoDB)
        run: |
          BUCKET="promata-tfstate-017820685038"
          TABLE="promata-terraform-locks"
          REGION="${{ env.AWS_REGION }}"

          HTTP_CODE=$(aws s3api head-bucket --bucket "$BUCKET" 2>&1 | grep -o '[0-9]\{3\}' | head -1 || true)

          if aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
            echo "✅ S3 bucket already exists and is owned by this account"
          elif [ "$HTTP_CODE" = "403" ]; then
            echo "❌ Bucket '$BUCKET' exists but belongs to another AWS account!"
            echo "   Change the bucket name in backend.tf and workflows."
            exit 1
          else
            echo "📦 Creating S3 bucket '$BUCKET'..."
            aws s3api create-bucket \
              --bucket "$BUCKET" \
              --region "$REGION" \
              --create-bucket-configuration LocationConstraint="$REGION"

            aws s3api wait bucket-exists --bucket "$BUCKET"

            aws s3api put-bucket-versioning \
              --bucket "$BUCKET" \
              --versioning-configuration Status=Enabled

            aws s3api put-bucket-encryption \
              --bucket "$BUCKET" \
              --server-side-encryption-configuration \
              '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'

            aws s3api put-public-access-block \
              --bucket "$BUCKET" \
              --public-access-block-configuration \
              "BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true"

            echo "✅ S3 bucket created successfully"
          fi

          if ! aws dynamodb describe-table --table-name "$TABLE" --region "$REGION" 2>/dev/null; then
            echo "🔑 Creating DynamoDB table..."
            aws dynamodb create-table \
              --table-name "$TABLE" \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST \
              --region "$REGION"

            aws dynamodb wait table-exists --table-name "$TABLE" --region "$REGION"
            echo "✅ DynamoDB table created"
          else
            echo "✅ DynamoDB table already exists"
          fi

      - name: Terraform Format Check
        run: |
          if ! terraform fmt -check -recursive; then
            echo "⚠️ Formatting issues found. Auto-fixing..."
            terraform fmt -recursive
          fi

      - name: Terraform Init
        run: |
          for i in 1 2 3; do
            terraform init && break
            echo "⚠️ Terraform init failed (attempt $i/3), waiting 10s..."
            sleep 10
          done

      - name: Force Unlock Stale State Lock
        working-directory: .
        run: |
          TABLE="promata-terraform-locks"
          REGION="${{ env.AWS_REGION }}"
          STATE_KEY="promata-tfstate-017820685038/aws/prod/terraform.tfstate"

          LOCK_INFO=$(aws dynamodb get-item \
            --table-name "$TABLE" \
            --key "{\"LockID\":{\"S\":\"$STATE_KEY\"}}" \
            --region "$REGION" 2>/dev/null || true)

          if echo "$LOCK_INFO" | grep -q "LockID"; then
            echo "🔓 Found stale lock, removing from DynamoDB..."
            aws dynamodb delete-item \
              --table-name "$TABLE" \
              --key "{\"LockID\":{\"S\":\"$STATE_KEY\"}}" \
              --region "$REGION"
            echo "✅ Lock released"
          else
            echo "✅ No stale lock found"
          fi
        continue-on-error: true

      - name: Validate Cloudflare Token
        id: cf_check
        run: |
          CF_TOKEN="${{ secrets.CLOUDFLARE_API_TOKEN }}"
          CF_ZONE="${{ secrets.CLOUDFLARE_ZONE_ID }}"

          if [ -z "$CF_TOKEN" ] || [ -z "$CF_ZONE" ]; then
            echo "⚠️ Cloudflare credentials not configured, disabling DNS module"
            echo "enable_cf=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          ZONE_RESPONSE=$(curl -s -X GET "https://api.cloudflare.com/client/v4/zones/$CF_ZONE/dns_records?per_page=1" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json")

          if echo "$ZONE_RESPONSE" | grep -q '"success":true'; then
            echo "✅ Cloudflare token has DNS access to zone"
            echo "enable_cf=true" >> $GITHUB_OUTPUT
          else
            echo "⚠️ Cloudflare token cannot access zone DNS. Disabling DNS module."
            echo "   To fix: Create a new API Token in Cloudflare with:"
            echo "   - Permission: Zone > DNS > Edit"
            echo "   - Zone Resources: Include > Specific zone > promata.com.br"
            echo "enable_cf=false" >> $GITHUB_OUTPUT
          fi

      - name: Migrate State (remove orphaned resources)
        run: |
          terraform state list 2>/dev/null | grep '^module\.email\.' | while read -r RESOURCE; do
            echo "🔄 Removing from state: $RESOURCE"
            terraform state rm "$RESOURCE" 2>/dev/null || true
          done

          if [ "${{ steps.cf_check.outputs.enable_cf }}" = "false" ]; then
            terraform state list 2>/dev/null | grep '^module\.dns' | while read -r RESOURCE; do
              echo "🔄 Removing from state: $RESOURCE"
              terraform state rm "$RESOURCE" 2>/dev/null || true
            done
          fi
        continue-on-error: true

      - name: Terraform Validate
        run: terraform validate

      - name: Import Existing Resources
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          TF_VAR_domain_name: ${{ vars.DOMAIN_NAME }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: |
          echo "🔄 Checking for existing resources to import..."
          chmod +x ../../scripts/terraform/import-all-existing-resources.sh
          ../../scripts/terraform/import-all-existing-resources.sh --auto || true

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var="domain_name=${{ vars.DOMAIN_NAME }}" \
            -var="cloudflare_api_token=${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -var="cloudflare_zone_id=${{ secrets.CLOUDFLARE_ZONE_ID }}" \
            -var="enable_cloudflare=${{ steps.cf_check.outputs.enable_cf }}" \
            -out=tfplan \
            -no-color
        env:
          TF_IN_AUTOMATION: true

      - name: Upload Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: iac/aws/tfplan
          retention-days: 7

      - name: Comment PR with Plan
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const output = `#### Terraform Plan 📝

            <details><summary>Show Plan</summary>

            \`\`\`terraform
            ${{ steps.plan.outputs.stdout }}
            \`\`\`

            </details>

            *Pushed by: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

      - name: Terraform Apply
        if: |
          (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply')
        run: terraform apply -auto-approve tfplan

      - name: Terraform Destroy
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'
        run: |
          terraform destroy \
            -var="domain_name=${{ vars.DOMAIN_NAME }}" \
            -var="cloudflare_api_token=${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -var="cloudflare_zone_id=${{ secrets.CLOUDFLARE_ZONE_ID }}" \
            -var="enable_cloudflare=${{ steps.cf_check.outputs.enable_cf }}" \
            -auto-approve

      - name: Extract Outputs
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        id: outputs
        run: |
          echo "ec2_public_ip=$(terraform output -raw manager_public_ip)" >> $GITHUB_OUTPUT
          echo "s3_bucket=$(terraform output -raw static_assets_bucket)" >> $GITHUB_OUTPUT
          echo "ssh_private_key<<EOF" >> $GITHUB_OUTPUT
          terraform output -raw ssh_private_key >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Save outputs to all repos
        if: |
          (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply')
        env:
          GH_TOKEN: ${{ secrets.GIT_TOKEN }}
        run: |
          EC2_IP="${{ steps.outputs.outputs.ec2_public_ip }}"
          S3_BUCKET="${{ steps.outputs.outputs.s3_bucket }}"
          ORG="AGES-Pro-Mata"
          REPOS=("${{ github.repository }}" "$ORG/backend" "$ORG/frontend")

          if [ -z "$GH_TOKEN" ]; then
            echo "⚠️ GIT_TOKEN not configured. Set secrets manually."
            exit 0
          fi

          terraform output -raw ssh_private_key > /tmp/ssh_key.pem 2>/dev/null || true

          for REPO in "${REPOS[@]}"; do
            echo "📝 Configuring $REPO..."
            if [ -n "$EC2_IP" ]; then
              echo "$EC2_IP" | gh secret set EC2_HOST --repo "$REPO" 2>/dev/null && \
                echo "  ✅ EC2_HOST" || echo "  ⚠️ EC2_HOST failed"
            fi
            if [ -f /tmp/ssh_key.pem ]; then
              gh secret set EC2_SSH_KEY --repo "$REPO" < /tmp/ssh_key.pem 2>/dev/null && \
                echo "  ✅ EC2_SSH_KEY" || echo "  ⚠️ EC2_SSH_KEY failed"
            fi
            if [ -n "$S3_BUCKET" ]; then
              gh variable set AWS_S3_BUCKET --repo "$REPO" --body "$S3_BUCKET" 2>/dev/null && \
                echo "  ✅ AWS_S3_BUCKET=$S3_BUCKET" || echo "  ⚠️ AWS_S3_BUCKET failed"
            fi
          done
          rm -f /tmp/ssh_key.pem

      - name: Deployment Summary
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          echo "## ✅ Infrastructure Deployed Successfully" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📊 Infrastructure Details" >> $GITHUB_STEP_SUMMARY
          echo "- **Region**: ${{ env.AWS_REGION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **EC2 IP**: \`${{ steps.outputs.outputs.ec2_public_ip }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **S3 Bucket**: \`${{ steps.outputs.outputs.s3_bucket }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Domain**: https://${{ vars.DOMAIN_NAME }}" >> $GITHUB_STEP_SUMMARY

      - name: Notify Discord
        if: always() && github.ref == 'refs/heads/main'
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_URL }}
          status: ${{ job.status }}
          title: "Infrastructure Deployment (AWS)"
          description: |
            Region: sa-east-1 (São Paulo)
            Action: ${{ github.event.inputs.action || 'apply' }}
          color: 0x00ff00
          username: GitHub Actions
