name: Deploy Backend

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_NAME: experimentanaturalmente/pro-mata-backend

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-24.04
    environment: Produção
    steps:
      - name: Checkout backend repository
        uses: actions/checkout@v4
        with:
          repository: AGES-Pro-Mata/backend
          token: ${{ secrets.GIT_TOKEN }}
          path: backend

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma Client
        working-directory: backend
        run: npx prisma generate

      - name: Type check
        working-directory: backend
        run: npx tsc --noEmit

      - name: Lint
        working-directory: backend
        run: npm run lint
        continue-on-error: true

      - name: Build
        working-directory: backend
        run: npm run build

  security:
    name: Security Scan
    runs-on: ubuntu-24.04
    environment: Produção
    needs: test
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout backend repository
        uses: actions/checkout@v4
        with:
          repository: AGES-Pro-Mata/backend
          token: ${{ secrets.GIT_TOKEN }}
          path: backend

      - name: NPM Audit
        working-directory: backend
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: 'backend'
          severity: 'HIGH,CRITICAL'
          format: 'sarif'
          output: 'trivy-results.sarif'
        continue-on-error: true

      - uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true

  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-24.04
    environment: Produção
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout backend repository
        uses: actions/checkout@v4
        with:
          repository: AGES-Pro-Mata/backend
          token: ${{ secrets.GIT_TOKEN }}
          path: backend
          ref: main

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile.deliver
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache,mode=max

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-24.04
    environment: Produção
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Check EC2 configuration
        id: check
        run: |
          if [ -z "${{ secrets.EC2_HOST }}" ]; then
            echo "⚠️ EC2_HOST secret not configured."
            echo "   Run deploy-infra-full.yml first to provision infrastructure,"
            echo "   then set EC2_HOST and EC2_SSH_KEY secrets from Terraform outputs."
            echo "skip=true" >> $GITHUB_OUTPUT
          elif [ -z "${{ secrets.EC2_SSH_KEY }}" ]; then
            echo "⚠️ EC2_SSH_KEY secret not configured."
            echo "   Download the ssh-key artifact from deploy-infra-full.yml"
            echo "   and set it as EC2_SSH_KEY secret."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Deploy via SSH
        if: steps.check.outputs.skip != 'true'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /opt/promata
            docker compose pull backend || docker-compose pull backend
            docker compose up -d backend || docker-compose up -d backend
            docker compose ps || docker-compose ps

      - uses: sarisia/actions-status-discord@v1
        if: always()
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_URL }}
          status: ${{ job.status }}
          title: "Backend Deployment"
