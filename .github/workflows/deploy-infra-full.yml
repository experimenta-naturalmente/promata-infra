name: Deploy Infrastructure + Configure (Full Stack)

on:
  push:
    branches: [main]
    paths:
      - 'iac/aws/**'
      - 'cac/**'
      - 'docker-compose.yml'
      - 'docker/**'
      - '.github/workflows/deploy-infra-full.yml'
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy      # Terraform + Ansible
          - infra-only  # Only Terraform
          - config-only # Only Ansible (requires existing infra)
          - destroy     # Destroy infrastructure

# Serializa com infra-aws.yml para evitar disputa pelo mesmo Terraform state lock
concurrency:
  group: terraform-aws-prod
  cancel-in-progress: false

env:
  AWS_REGION: sa-east-1
  TF_VERSION: 1.10.0
  ANSIBLE_VERSION: 2.15

jobs:
  # ============================================================================
  # TERRAFORM - Provision Infrastructure
  # ============================================================================
  terraform:
    name: Provision Infrastructure
    runs-on: ubuntu-24.04
    environment: Produção
    if: github.event.inputs.action != 'config-only'
    outputs:
      ec2_ip: ${{ steps.outputs.outputs.ec2_ip }}
      ssh_key: ${{ steps.outputs.outputs.ssh_key }}
      s3_bucket: ${{ steps.outputs.outputs.s3_bucket }}
    defaults:
      run:
        working-directory: iac/aws

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform Backend
        run: |
          BUCKET="promata-tfstate-017820685038"
          TABLE="promata-terraform-locks"
          REGION="${{ env.AWS_REGION }}"

          # head-bucket returns 0 if we own it, non-zero otherwise.
          # A 403 means the bucket exists but belongs to another account.
          # A 404 means it truly doesn't exist.
          HTTP_CODE=$(aws s3api head-bucket --bucket "$BUCKET" 2>&1 | grep -o '[0-9]\{3\}' | head -1 || true)

          if aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
            echo "✅ S3 bucket already exists and is owned by this account"
          elif [ "$HTTP_CODE" = "403" ]; then
            echo "❌ Bucket '$BUCKET' exists but belongs to another AWS account!"
            echo "   Change the bucket name in backend.tf and workflows."
            exit 1
          else
            echo "📦 Creating S3 bucket '$BUCKET'..."
            aws s3api create-bucket \
              --bucket "$BUCKET" \
              --region "$REGION" \
              --create-bucket-configuration LocationConstraint="$REGION"

            echo "⏳ Waiting for bucket to be available..."
            aws s3api wait bucket-exists --bucket "$BUCKET"

            aws s3api put-bucket-versioning \
              --bucket "$BUCKET" \
              --versioning-configuration Status=Enabled

            aws s3api put-bucket-encryption \
              --bucket "$BUCKET" \
              --server-side-encryption-configuration \
              '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'

            aws s3api put-public-access-block \
              --bucket "$BUCKET" \
              --public-access-block-configuration \
              "BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true"

            echo "✅ S3 bucket created successfully"
          fi

          # DynamoDB lock table
          if ! aws dynamodb describe-table --table-name "$TABLE" --region "$REGION" 2>/dev/null; then
            echo "🔑 Creating DynamoDB table..."
            aws dynamodb create-table \
              --table-name "$TABLE" \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST \
              --region "$REGION"

            aws dynamodb wait table-exists --table-name "$TABLE" --region "$REGION"
            echo "✅ DynamoDB table created"
          else
            echo "✅ DynamoDB table already exists"
          fi

      - name: Terraform Init
        run: |
          for i in 1 2 3; do
            terraform init && break
            echo "⚠️ Terraform init failed (attempt $i/3), waiting 10s..."
            sleep 10
          done

      - name: Force Unlock Stale State Lock
        working-directory: .
        run: |
          TABLE="promata-terraform-locks"
          REGION="${{ env.AWS_REGION }}"
          STATE_KEY="promata-tfstate-017820685038/aws/prod/terraform.tfstate"

          LOCK_INFO=$(aws dynamodb get-item \
            --table-name "$TABLE" \
            --key "{\"LockID\":{\"S\":\"$STATE_KEY\"}}" \
            --region "$REGION" 2>/dev/null || true)

          if echo "$LOCK_INFO" | grep -q "LockID"; then
            echo "🔓 Found stale lock, removing from DynamoDB..."
            aws dynamodb delete-item \
              --table-name "$TABLE" \
              --key "{\"LockID\":{\"S\":\"$STATE_KEY\"}}" \
              --region "$REGION"
            echo "✅ Lock released"
          else
            echo "✅ No stale lock found"
          fi
        continue-on-error: true

      - name: Validate Cloudflare Token
        id: cf_check
        run: |
          CF_TOKEN="${{ secrets.CLOUDFLARE_API_TOKEN }}"
          CF_ZONE="${{ secrets.CLOUDFLARE_ZONE_ID }}"

          if [ -z "$CF_TOKEN" ] || [ -z "$CF_ZONE" ]; then
            echo "⚠️ Cloudflare credentials not configured, disabling DNS module"
            echo "enable_cf=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          ZONE_RESPONSE=$(curl -s -X GET "https://api.cloudflare.com/client/v4/zones/$CF_ZONE/dns_records?per_page=1" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json")

          if echo "$ZONE_RESPONSE" | grep -q '"success":true'; then
            echo "✅ Cloudflare token has DNS access to zone"
            echo "enable_cf=true" >> $GITHUB_OUTPUT
          else
            echo "⚠️ Cloudflare token cannot access zone DNS. Disabling DNS module."
            echo "   Response: $ZONE_RESPONSE"
            echo ""
            echo "   To fix: Create a new API Token in Cloudflare with:"
            echo "   - Permission: Zone > DNS > Edit"
            echo "   - Zone Resources: Include > Specific zone > promata.com.br"
            echo "enable_cf=false" >> $GITHUB_OUTPUT
          fi

      - name: Migrate State (remove orphaned resources)
        run: |
          terraform state list 2>/dev/null | grep '^module\.email\.' | while read -r RESOURCE; do
            echo "🔄 Removing from state: $RESOURCE"
            terraform state rm "$RESOURCE" 2>/dev/null || true
          done

          if [ "${{ steps.cf_check.outputs.enable_cf }}" = "false" ]; then
            terraform state list 2>/dev/null | grep '^module\.dns' | while read -r RESOURCE; do
              echo "🔄 Removing from state: $RESOURCE"
              terraform state rm "$RESOURCE" 2>/dev/null || true
            done
          fi
        continue-on-error: true

      - name: Import Existing Resources
        if: github.event.inputs.action != 'destroy'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: |
          chmod +x ../../scripts/terraform/import-all-existing-resources.sh
          ../../scripts/terraform/import-all-existing-resources.sh --auto || true

      - name: Terraform Destroy
        if: github.event.inputs.action == 'destroy'
        run: |
          terraform destroy -auto-approve \
            -var="domain_name=${{ vars.DOMAIN_NAME }}" \
            -var="cloudflare_api_token=${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -var="cloudflare_zone_id=${{ secrets.CLOUDFLARE_ZONE_ID }}" \
            -var="enable_cloudflare=${{ steps.cf_check.outputs.enable_cf }}"

      - name: Terraform Apply
        if: github.event.inputs.action != 'destroy'
        run: |
          terraform apply -auto-approve \
            -var="domain_name=${{ vars.DOMAIN_NAME }}" \
            -var="cloudflare_api_token=${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -var="cloudflare_zone_id=${{ secrets.CLOUDFLARE_ZONE_ID }}" \
            -var="enable_cloudflare=${{ steps.cf_check.outputs.enable_cf }}"

      - name: Extract Outputs
        if: github.event.inputs.action != 'destroy'
        id: outputs
        run: |
          echo "ec2_ip=$(terraform output -raw manager_public_ip)" >> $GITHUB_OUTPUT
          echo "s3_bucket=$(terraform output -raw static_assets_bucket)" >> $GITHUB_OUTPUT
          terraform output -raw ssh_private_key > /tmp/ssh_key.pem
          chmod 600 /tmp/ssh_key.pem
          echo "ssh_key=$(terraform output -raw ssh_private_key | base64 -w 0)" >> $GITHUB_OUTPUT

      - name: Upload SSH Key as Artifact
        if: github.event.inputs.action != 'destroy'
        uses: actions/upload-artifact@v4
        with:
          name: ssh-key
          path: /tmp/ssh_key.pem
          retention-days: 1

  # ============================================================================
  # ANSIBLE - Configure Server & Deploy Stack
  # ============================================================================
  ansible:
    name: Configure & Deploy Stack
    runs-on: ubuntu-24.04
    environment: Produção
    needs: terraform
    if: |
      always() && 
      (needs.terraform.result == 'success' || github.event.inputs.action == 'config-only') &&
      github.event.inputs.action != 'destroy'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Ansible
        run: |
          pip install ansible boto3 botocore

      - name: Get EC2 IP
        id: ec2
        run: |
          if [ "${{ github.event.inputs.action }}" == "config-only" ]; then
            # For config-only, use secret or fetch from AWS
            EC2_IP="${{ secrets.EC2_HOST }}"
            if [ -z "$EC2_IP" ]; then
              pip install awscli
              EC2_IP=$(aws ec2 describe-instances \
                --filters "Name=tag:Name,Values=promata-prod-manager" "Name=instance-state-name,Values=running" \
                --query "Reservations[0].Instances[0].PublicIpAddress" \
                --output text --region ${{ env.AWS_REGION }})
            fi
          else
            EC2_IP="${{ needs.terraform.outputs.ec2_ip }}"
          fi
          echo "ip=$EC2_IP" >> $GITHUB_OUTPUT
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Download SSH Key (from Terraform)
        if: github.event.inputs.action != 'config-only'
        uses: actions/download-artifact@v4
        with:
          name: ssh-key
          path: /tmp/

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          if [ "${{ github.event.inputs.action }}" == "config-only" ]; then
            echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/promata.pem
          else
            cp /tmp/ssh_key.pem ~/.ssh/promata.pem
          fi
          chmod 600 ~/.ssh/promata.pem
          
          # Add host to known_hosts
          ssh-keyscan -H ${{ steps.ec2.outputs.ip }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Wait for EC2 to be ready
        run: |
          echo "⏳ Waiting for EC2 to be SSH-ready..."
          for i in {1..30}; do
            if ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 -i ~/.ssh/promata.pem ubuntu@${{ steps.ec2.outputs.ip }} "echo 'SSH OK'" 2>/dev/null; then
              echo "✅ EC2 is ready!"
              break
            fi
            echo "Attempt $i/30 - waiting..."
            sleep 10
          done

      - name: Create Ansible Inventory
        run: |
          mkdir -p cac/inventory/prod/group_vars
          
          cat > cac/inventory/prod/hosts.yml << EOF
          all:
            children:
              managers:
                hosts:
                  promata-prod:
                    ansible_host: ${{ steps.ec2.outputs.ip }}
                    ansible_user: ubuntu
                    ansible_ssh_private_key_file: ~/.ssh/promata.pem
                    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
          EOF

      - name: Create Ansible Variables
        run: |
          cat > cac/inventory/prod/group_vars/all.yml << EOF
          # Project Configuration
          project_name: promata
          environment: prod
          domain_name: ${{ vars.DOMAIN_NAME }}
          
          # Docker Configuration  
          docker_compose_version: v2.31.0
          
          # Application Images
          backend_image: experimentanaturalmente/pro-mata-backend:latest
          
          # Stack Environment Variables
          stack_environment:
            DOMAIN_NAME: "${{ vars.DOMAIN_NAME }}"
            POSTGRES_DB: promata
            POSTGRES_USER: promata
            POSTGRES_PASSWORD: "${{ secrets.POSTGRES_PASSWORD }}"
            JWT_SECRET: "${{ secrets.JWT_SECRET }}"
            APP_SECRET: "${{ secrets.APP_SECRET }}"
            ACME_EMAIL: "admin@${{ vars.DOMAIN_NAME }}"
            TRAEFIK_LOG_LEVEL: INFO
          EOF

      - name: Run Ansible Playbook
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
          ANSIBLE_STDOUT_CALLBACK: yaml
          DOMAIN_NAME: ${{ vars.DOMAIN_NAME }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          APP_SECRET: ${{ secrets.APP_SECRET }}
          AWS_REGION: ${{ env.AWS_REGION }}
          S3_BUCKET_NAME: ${{ vars.S3_BUCKET_NAME || 'promata-prod-static-assets' }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          cd cac
          ansible-playbook \
            -i inventory/prod/hosts.yml \
            playbooks/deploy-prod-simple.yml \
            -v

      - name: Verify Deployment
        run: |
          echo "🔍 Verifying deployment..."
          sleep 30  # Wait for containers to start
          
          # Check via SSH
          ssh -i ~/.ssh/promata.pem ubuntu@${{ steps.ec2.outputs.ip }} << 'EOF'
            echo "=== Docker Containers ==="
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
            echo ""
            echo "=== Docker Compose Services ==="
            cd /opt/promata && docker-compose ps 2>/dev/null || true
          EOF

      - name: Health Check
        run: |
          echo "🏥 Running health checks..."
          
          # Direct IP check
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 10 http://${{ steps.ec2.outputs.ip }} || echo "000")
          echo "HTTP (IP): $HTTP_CODE"
          
          # Domain check (may take time for DNS)
          DOMAIN_CODE=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 10 https://${{ vars.DOMAIN_NAME }} || echo "000")
          echo "HTTPS (Domain): $DOMAIN_CODE"
          
          if [ "$HTTP_CODE" == "000" ] && [ "$DOMAIN_CODE" == "000" ]; then
            echo "⚠️ Services not responding yet. Check manually."
          else
            echo "✅ Services responding!"
          fi

      - name: Save secrets and variables to all repos
        if: github.event.inputs.action != 'config-only'
        env:
          GH_TOKEN: ${{ secrets.GIT_TOKEN }}
        run: |
          set -uo pipefail
          EC2_IP="${{ steps.ec2.outputs.ip }}"
          S3_BUCKET="${{ needs.terraform.outputs.s3_bucket }}"
          ORG="AGES-Pro-Mata"
          REPOS=("${{ github.repository }}" "$ORG/backend" "$ORG/frontend")

          if [ -z "$GH_TOKEN" ]; then
            echo "❌ GIT_TOKEN not configured. Cannot propagate secrets to backend/frontend repos."
            echo "   Configure a PAT with 'repo' scope (or fine-grained: Secrets + Variables read/write on org repos)."
            exit 1
          fi

          if [ ! -s ~/.ssh/promata.pem ]; then
            echo "❌ SSH key file ~/.ssh/promata.pem is missing or empty."
            exit 1
          fi

          if [ -z "$EC2_IP" ] || [ -z "$S3_BUCKET" ]; then
            echo "❌ Missing required outputs (EC2_IP='$EC2_IP', S3_BUCKET='$S3_BUCKET')."
            exit 1
          fi

          FAILED=0
          for REPO in "${REPOS[@]}"; do
            echo "📝 Configuring $REPO..."

            if echo "$EC2_IP" | gh secret set EC2_HOST --repo "$REPO"; then
              echo "  ✅ EC2_HOST saved"
            else
              echo "  ❌ Failed to save EC2_HOST on $REPO"
              FAILED=1
            fi

            if gh secret set EC2_SSH_KEY --repo "$REPO" --body-file ~/.ssh/promata.pem; then
              echo "  ✅ EC2_SSH_KEY saved"
            else
              echo "  ❌ Failed to save EC2_SSH_KEY on $REPO"
              FAILED=1
            fi

            if gh variable set AWS_S3_BUCKET --repo "$REPO" --body "$S3_BUCKET"; then
              echo "  ✅ AWS_S3_BUCKET=$S3_BUCKET saved"
            else
              echo "  ❌ Failed to save AWS_S3_BUCKET on $REPO"
              FAILED=1
            fi
          done

          if [ "$FAILED" -ne 0 ]; then
            echo ""
            echo "❌ One or more secret/variable updates failed."
            echo "   Check that GIT_TOKEN has admin access to AGES-Pro-Mata/backend and AGES-Pro-Mata/frontend."
            exit 1
          fi

          echo ""
          echo "✅ All repos configured successfully"

  # ============================================================================
  # SUMMARY
  # ============================================================================
  summary:
    name: Deployment Summary
    runs-on: ubuntu-24.04
    environment: Produção
    needs: [terraform, ansible]
    if: always() && github.event.inputs.action != 'destroy'
    
    steps:
      - name: Generate Summary
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### Infrastructure (Terraform)" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ needs.terraform.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- EC2 IP: \`${{ needs.terraform.outputs.ec2_ip }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### Configuration (Ansible)" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ needs.ansible.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### 🌐 Access Points" >> $GITHUB_STEP_SUMMARY
          echo "- **API**: https://api.${{ vars.DOMAIN_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Traefik**: https://traefik.${{ vars.DOMAIN_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Direct IP**: http://${{ needs.terraform.outputs.ec2_ip }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.ansible.result }}" == "success" ]; then
            echo "### ✅ Deployment Complete!" >> $GITHUB_STEP_SUMMARY
            echo "Your infrastructure is ready. DNS propagation may take 1-5 minutes." >> $GITHUB_STEP_SUMMARY
          else
            echo "### ⚠️ Deployment Incomplete" >> $GITHUB_STEP_SUMMARY
            echo "Check the logs above for errors." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Notify Discord
        if: always()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_URL }}
          status: ${{ needs.ansible.result }}
          title: "Full Stack Deployment"
          description: |
            **Terraform**: ${{ needs.terraform.result }}
            **Ansible**: ${{ needs.ansible.result }}
            **EC2 IP**: ${{ needs.terraform.outputs.ec2_ip }}
            **Domain**: https://${{ vars.DOMAIN_NAME }}
